spring.application.name=svc-orders
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_orders}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URL base de svc-menu - dentro de la red Docker se resuelve por el nombre del servicio
menu.service.url=${MENU_SERVICE_URL:http://svc-menu:8081}

# URL base de svc-inventory (punto extra) - opcional
inventory.service.url=${INVENTORY_SERVICE_URL:http://svc-inventory:8083}
inventory.service.enabled=${INVENTORY_SERVICE_ENABLED:true}

logging.level.com.restaurantetech.orders=DEBUG
