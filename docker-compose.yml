version: "3.9"

services:

  # ---------------- Bases de datos ----------------

  db-menu:
    image: postgres:16-alpine
    container_name: db-menu
    environment:
      POSTGRES_DB: db_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_menu_data:/var/lib/postgresql/data
    networks:
      - restaurantetech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_menu"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-orders:
    image: postgres:16-alpine
    container_name: db-orders
    environment:
      POSTGRES_DB: db_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - db_orders_data:/var/lib/postgresql/data
    networks:
      - restaurantetech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Base de datos de svc-inventory (PUNTO EXTRA)
  db-inventory:
    image: postgres:16-alpine
    container_name: db-inventory
    environment:
      POSTGRES_DB: db_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - db_inventory_data:/var/lib/postgresql/data
    networks:
      - restaurantetech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------- Microservicios ----------------

  svc-menu:
    build: ./svc-menu
    container_name: svc-menu
    environment:
      DB_HOST: db-menu
      DB_PORT: 5432
      DB_NAME: db_menu
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db-menu:
        condition: service_healthy
    networks:
      - restaurantetech-net
    # No se publica ningun puerto al host: solo accesible dentro de la red Docker

  svc-orders:
    build: ./svc-orders
    container_name: svc-orders
    environment:
      DB_HOST: db-orders
      DB_PORT: 5432
      DB_NAME: db_orders
      DB_USER: postgres
      DB_PASSWORD: postgres
      MENU_SERVICE_URL: http://svc-menu:8081
      INVENTORY_SERVICE_URL: http://svc-inventory:8083
      INVENTORY_SERVICE_ENABLED: "true"
    depends_on:
      db-orders:
        condition: service_healthy
      svc-menu:
        condition: service_started
      svc-inventory:
        condition: service_started
    networks:
      - restaurantetech-net

  # svc-inventory (PUNTO EXTRA)
  svc-inventory:
    build: ./svc-inventory
    container_name: svc-inventory
    environment:
      DB_HOST: db-inventory
      DB_PORT: 5432
      DB_NAME: db_inventory
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db-inventory:
        condition: service_healthy
    networks:
      - restaurantetech-net

  # ---------------- API Gateway ----------------

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - svc-menu
      - svc-orders
      - svc-inventory
    networks:
      - restaurantetech-net

networks:
  restaurantetech-net:
    driver: bridge

volumes:
  db_menu_data:
  db_orders_data:
  db_inventory_data:
